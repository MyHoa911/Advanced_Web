<div class="admin-form-page">
  <div class="container py-4" style="max-width: 900px">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h4 class="mb-0">
        <i class="bi bi-{{isEdit ? 'pencil-square' : 'plus-circle'}} me-2"></i>
        {{ isEdit ? 'Edit Fashion' : 'Add New Fashion' }}
      </h4>
      <button class="btn btn-outline-secondary btn-sm" (click)="cancel()">
        <i class="bi bi-arrow-left me-1"></i> Back to List
      </button>
    </div>

    @if (errMessage) {
      <div class="alert alert-danger alert-dismissible">
        {{ errMessage }}
        <button type="button" class="btn-close" (click)="errMessage=''"></button>
      </div>
    }
    @if (successMessage) {
      <div class="alert alert-success">{{ successMessage }}</div>
    }

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <!-- Style -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Style <span class="text-danger">*</span></label>
          <div class="input-group">
            <select class="form-select" [(ngModel)]="fashion.style">
              <option value="">-- Select Style --</option>
              @for (s of styles; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
            <input type="text" class="form-control" placeholder="Or type custom style..."
              [(ngModel)]="fashion.style" style="max-width:220px" />
          </div>
          <div class="form-text">Select from list or type a custom style name.</div>
        </div>

        <!-- Title -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Fashion Title <span class="text-danger">*</span></label>
          <input type="text" class="form-control" placeholder="Enter fashion title..."
            [(ngModel)]="fashion.fashion_subject" />
        </div>

        <!-- Fashion Detail - WYSIWYG -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Fashion Detail (WYSIWYG)</label>
          <div #quillEditor class="quill-editor-container"></div>
        </div>

        <!-- Image Upload -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Thumbnail Image</label>
          <input type="file" class="form-control" accept="image/*" (change)="onImageChange($event)" />
          <div class="form-text">Max 2MB. Current image will be kept if no new file is selected.</div>
          @if (fashion.fashion_image) {
            <div class="mt-2">
              <img [src]="fashion.fashion_image" alt="preview"
                style="max-height:120px; border-radius:4px; border:1px solid #ddd;"
                onerror="this.style.display='none'" />
              <span class="badge bg-success ms-2">Image ready</span>
            </div>
          }
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-2">
          <button class="btn btn-dark px-4" (click)="save()" [disabled]="isSaving">
            @if (isSaving) {
              <span class="spinner-border spinner-border-sm me-1"></span>
            }
            <i class="bi bi-save me-1"></i>
            {{ isEdit ? 'Update' : 'Save' }}
          </button>
          <button class="btn btn-outline-secondary px-4" (click)="cancel()">
            <i class="bi bi-x-circle me-1"></i> Cancel
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
