<div class="shop-container">
  <!-- Header -->
  <div class="shop-header">
    <div class="header-left">
      <h1>Cửa Hàng Thời Trang</h1>
      <p class="subtitle">Chọn sản phẩm bạn yêu thích</p>
    </div>
    <div class="header-right">
      <button class="btn-cart" (click)="goToCart()">
        Giỏ hàng
        <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </button>
    </div>
  </div>

  <!-- Error -->
  <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

  <!-- Loading -->
  <div class="loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>Đang tải sản phẩm...</p>
  </div>

  <!-- Product Grid -->
  <div class="product-grid" *ngIf="!loading && products.length > 0">
    <div
      class="product-card"
      *ngFor="let product of products"
      [class.added]="addedProductId === product._id"
    >
      <div class="product-img-wrap">
        <img [src]="product.image" [alt]="product.name" class="product-img" />
        <span class="product-category">{{ product.category }}</span>
      </div>
      <div class="product-body">
        <h3 class="product-name">{{ product.name }}</h3>
        <p class="product-desc">{{ product.description }}</p>
        <div class="product-footer">
          <span class="product-price">{{ formatPrice(product.price) }}</span>
          <span class="product-stock" [class.low-stock]="product.stock < 10">
            Còn {{ product.stock }} cái
          </span>
        </div>
        <button class="btn-add" (click)="addToCart(product)" [disabled]="product.stock === 0">
          <span *ngIf="addedProductId !== product._id">Thêm vào giỏ</span>
          <span *ngIf="addedProductId === product._id" class="added-text">Đã thêm!</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Empty -->
  <div class="empty-state" *ngIf="!loading && products.length === 0">
    <p>Không có sản phẩm nào.</p>
  </div>
</div>
